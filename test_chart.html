<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head><body style="background:#000;color:#fff;margin:40px">
<h2>Chart.js Test</h2>
<div style="width:600px;height:400px"><canvas id="c"></canvas></div>
<div id="status" style="margin-top:20px;color:#30d158"></div>
<script>
document.getElementById('status').textContent = 'Chart.js loaded: ' + (typeof Chart !== 'undefined' ? 'YES' : 'NO');
if (typeof Chart !== 'undefined') {
  new Chart(document.getElementById('c'), {
    type: 'line',
    data: { labels: ['A','B','C','D'], datasets: [{ label: 'Test', data: [1,3,2,4], borderColor: '#0a84ff' }] },
    options: { scales: { y: { beginAtZero: true } } }
  });
  document.getElementById('status').textContent += ' — Chart rendered!';
} else {
  document.getElementById('status').textContent += ' — FAILED to load CDN';
}
</script>
</body></html>
