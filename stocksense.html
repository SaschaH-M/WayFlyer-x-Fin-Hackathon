<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSense — Pretty Fly</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#000;--bg2:rgba(28,28,30,.6);--b:rgba(255,255,255,.06);--t:#f5f5f7;--t2:#98989d;--t3:#6e6e73;--bl:#0a84ff;--gr:#30d158;--rd:#ff453a;--am:#ff9f0a;--pu:#bf5af2;--pk:#ff375f}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  
  /* TOP BAR */
  .topbar{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--b);padding:14px 24px}
  .tb-inner{max-width:1500px;margin:0 auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .logo{font-size:20px;font-weight:800;letter-spacing:-.5px;white-space:nowrap}
  .logo span{color:var(--bl)}.logo .ss{color:var(--gr)}
  .stats-row{display:flex;gap:16px;flex:1;justify-content:center;flex-wrap:wrap}
  .stat-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--b);white-space:nowrap}
  .stat-pill .sv{font-weight:700;margin-right:4px}
  .stat-pill.reorder{border-color:rgba(255,69,58,.3);background:rgba(255,69,58,.08);color:var(--rd)}
  .stat-pill.markdown{border-color:rgba(255,159,10,.3);background:rgba(255,159,10,.08);color:var(--am)}
  .stat-pill.watch{border-color:rgba(10,132,255,.3);background:rgba(10,132,255,.08);color:var(--bl)}
  .stat-pill.healthy{border-color:rgba(48,209,88,.3);background:rgba(48,209,88,.08);color:var(--gr)}

  /* TAB BAR */
  .tab-bar{max-width:1500px;margin:0 auto;padding:16px 24px 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tab-bar .search{background:var(--bg2);border:1px solid var(--b);border-radius:24px;padding:8px 16px;color:var(--t);font-size:13px;width:220px;outline:none;font-family:inherit}
  .tab-bar .search:focus{border-color:var(--bl)}
  .tab{font-size:12px;font-weight:600;padding:7px 18px;border-radius:20px;border:1px solid var(--b);background:transparent;color:var(--t2);cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
  .tab:hover{border-color:rgba(255,255,255,.2);color:var(--t)}
  .tab.active{background:var(--bl);border-color:var(--bl);color:#fff}
  .tab .count{opacity:.7;font-weight:400}

  /* GRID */
  .grid{max-width:1500px;margin:0 auto;padding:8px 24px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  
  /* PRODUCT CARD */
  .pcard{background:var(--bg2);border:1px solid var(--b);border-radius:16px;padding:20px;cursor:pointer;transition:all .25s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;overflow:hidden}
  .pcard:hover{border-color:rgba(255,255,255,.14);transform:translateY(-1px)}
  .pcard.reorder-card{border-left:3px solid var(--rd)}
  .pcard.markdown-card{border-left:3px solid var(--am)}
  .pcard.watch-card{border-left:3px solid var(--bl)}
  .pcard.healthy-card{border-left:3px solid var(--gr)}
  .pcard .phead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .pcard .pname{font-size:15px;font-weight:700;letter-spacing:-.2px;line-height:1.2;flex:1}
  .pcard .pname .ptype{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block}
  .pcard .score{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;margin-left:12px}
  .pcard .score.hi{background:rgba(255,69,58,.15);color:var(--rd)}
  .pcard .score.md{background:rgba(255,159,10,.12);color:var(--am)}
  .pcard .score.lo{background:rgba(48,209,88,.12);color:var(--gr)}
  
  .pcard .pstats{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
  .pcard .pst{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
  .pcard .pst span{display:block;font-size:14px;font-weight:600;color:var(--t);margin-top:2px}
  
  .pcard .spark{width:100%;height:40px;margin-bottom:8px}
  .pcard .spark canvas{width:100%;height:100%}
  
  .pcard .rec{font-size:11px;padding:6px 10px;border-radius:8px;line-height:1.4}
  .pcard .rec.reorder-rec{background:rgba(255,69,58,.08);color:var(--rd)}
  .pcard .rec.markdown-rec{background:rgba(255,159,10,.08);color:var(--am)}
  .pcard .rec.watch-rec{background:rgba(10,132,255,.08);color:var(--bl)}
  .pcard .rec.healthy-rec{background:rgba(48,209,88,.08);color:var(--gr)}

  /* DETAIL MODAL */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px}
  .modal-overlay.open{display:flex}
  .modal{background:#111;border:1px solid var(--b);border-radius:20px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:32px}
  .modal .close-btn{float:right;background:none;border:none;color:var(--t2);font-size:24px;cursor:pointer;line-height:1;padding:0 0 8px 8px}
  .modal .mname{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
  .modal .mtype{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
  .modal .mscore{font-size:56px;font-weight:900;letter-spacing:-2px;margin:12px 0}
  .modal .mstats{display:flex;gap:20px;flex-wrap:wrap;margin:20px 0}
  .modal .mst{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
  .modal .mst span{display:block;font-size:20px;font-weight:700;color:var(--t);margin-top:2px}
  .modal .chart-box{margin:20px 0}
  .modal .chart-box .clabel{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .modal .chart-box canvas{width:100%!important;height:160px!important}
  .modal .mrec{padding:16px;border-radius:12px;font-size:14px;line-height:1.6;margin-top:16px}
  .modal .mrec.reorder-rec{background:rgba(255,69,58,.08);color:var(--rd);border:1px solid rgba(255,69,58,.2)}
  .modal .mrec.markdown-rec{background:rgba(255,159,10,.08);color:var(--am);border:1px solid rgba(255,159,10,.2)}
  .modal .mrec.watch-rec{background:rgba(10,132,255,.08);color:var(--bl);border:1px solid rgba(10,132,255,.2)}
  .modal .mrec.healthy-rec{background:rgba(48,209,88,.08);color:var(--gr);border:1px solid rgba(48,209,88,.2)}

  footer{max-width:1500px;margin:0 auto;padding:40px 24px;border-top:1px solid var(--b);text-align:center;color:var(--t3);font-size:12px}

  @media(max-width:768px){.grid{grid-template-columns:1fr}.stats-row{display:none}.modal{padding:20px}}
</style>

<body>

<div class="topbar">
  <div class="tb-inner">
    <div class="logo">Stock<span class="ss">Sense</span> <span>Pretty Fly</span></div>
    <div class="stats-row">
      <div class="stat-pill reorder"><span class="sv" id="reorder-count">—</span>Reorder Now</div>
      <div class="stat-pill watch"><span class="sv" id="watch-count">—</span>Watch</div>
      <div class="stat-pill healthy"><span class="sv" id="healthy-count">—</span>Healthy</div>
      <div class="stat-pill markdown"><span class="sv" id="markdown-count">—</span>Mark Down</div>
    </div>
    <div style="font-size:12px;color:var(--t3)">Avg Score <span id="avg-score" style="color:var(--t);font-weight:700">—</span></div>
  </div>
</div>

<div class="tab-bar">
  <input class="search" placeholder="Search products..." id="search" oninput="filter()">
  <button class="tab active" onclick="setFilter('all')">All<span class="count"> 645</span></button>
  <button class="tab" onclick="setFilter('reorder')">Reorder<span class="count" id="tab-reorder"> —</span></button>
  <button class="tab" onclick="setFilter('watch')">Watch<span class="count" id="tab-watch"> —</span></button>
  <button class="tab" onclick="setFilter('healthy')">Healthy<span class="count" id="tab-healthy"> —</span></button>
  <button class="tab" onclick="setFilter('markdown')">Mark Down<span class="count" id="tab-markdown"> —</span></button>
  <span style="margin-left:auto;font-size:11px;color:var(--t3)">Sorted by StockSense Score ↓</span>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<footer>StockSense · Pretty Fly Data Pack · Hackathon 2026<br>All demand scores computed from 24 months of sales data, seasonality-adjusted.</footer>

<script>
var D = null;
var currentFilter = 'all';
var currentSearch = '';

document.addEventListener('DOMContentLoaded', function(){
  D = window.STOCKSENSE_DATA;
  if (!D) { document.getElementById('grid').innerHTML = '<p style="color:var(--rd);padding:40px">ERROR: STOCKSENSE_DATA not loaded.</p>'; return; }
  
  // Sort by score descending
  D.variants.sort(function(a,b){ return b.stocksense_score - a.stocksense_score; });
  
  // Update summary
  document.getElementById('reorder-count').textContent = D.summary.reorder_count;
  document.getElementById('watch-count').textContent = D.summary.watch_count;
  document.getElementById('healthy-count').textContent = D.summary.healthy_count;
  document.getElementById('markdown-count').textContent = D.summary.markdown_count;
  document.getElementById('avg-score').textContent = D.summary.avg_stocksense_score;
  document.getElementById('tab-reorder').textContent = ' ' + D.summary.reorder_count;
  document.getElementById('tab-watch').textContent = ' ' + D.summary.watch_count;
  document.getElementById('tab-healthy').textContent = ' ' + D.summary.healthy_count;
  document.getElementById('tab-markdown').textContent = ' ' + D.summary.markdown_count;
  
  render();
});

function filter(){
  currentSearch = document.getElementById('search').value.toLowerCase();
  render();
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  event.target.classList.add('active');
  render();
}

function render(){
  var grid = document.getElementById('grid');
  var html = '';
  var shown = 0;
  
  for (var i = 0; i < D.variants.length; i++) {
    var v = D.variants[i];
    
    // Filter
    if (currentFilter !== 'all' && v.status !== currentFilter) continue;
    if (currentSearch && v.product_name.toLowerCase().indexOf(currentSearch) === -1 && v.variant_id.toLowerCase().indexOf(currentSearch) === -1) continue;
    
    // Score color class
    var sc = v.stocksense_score >= 60 ? 'hi' : v.stocksense_score >= 40 ? 'md' : 'lo';
    var cardClass = v.status + '-card';
    
    // Sparkline ID
    var sid = 'spark-' + i;
    
    html += '<div class="pcard ' + cardClass + '" onclick="openModal(' + i + ')">';
    html += '<div class="phead">';
    html += '<div class="pname"><span class="ptype">' + esc(v.product_type) + '</span>' + esc(v.product_name) + '</div>';
    html += '<div class="score ' + sc + '">' + v.stocksense_score + '</div>';
    html += '</div>';
    html += '<div class="pstats">';
    html += '<div class="pst">Stock<span>' + (v.inventory > 0 ? v.inventory : '<span style=color:var(--rd)>0</span>') + '</span></div>';
    html += '<div class="pst">Velocity<span>' + v.velocity_weekly.toFixed(1) + '/wk</span></div>';
    html += '<div class="pst">Cover<span>' + (v.months_cover >= 999 ? '∞' : v.months_cover.toFixed(0) + 'mo') + '</span></div>';
    html += '<div class="pst">Margin<span>' + v.margin_pct.toFixed(0) + '%</span></div>';
    html += '</div>';
    html += '<div class="spark"><canvas id="' + sid + '"></canvas></div>';
    html += '<div class="rec ' + v.status + '-rec">' + esc(v.recommendation) + '</div>';
    html += '</div>';
    shown++;
  }
  
  grid.innerHTML = html || '<p style="color:var(--t2);padding:40px;grid-column:1/-1;text-align:center">No results for "' + esc(currentSearch) + '"</p>';
  
  // Render sparklines after DOM update
  setTimeout(renderSparklines, 50);
}

function renderSparklines(){
  var canvases = document.querySelectorAll('.spark canvas');
  for (var c = 0; c < canvases.length; c++) {
    var canvas = canvases[c];
    var id = canvas.id;
    var parts = id.split('-');
    var idx = parseInt(parts[1]);
    if (idx >= D.variants.length) continue;
    var v = D.variants[idx];
    
    if (v.sparkline.length < 2) continue;
    
    // Destroy existing chart if any
    var existing = Chart.getChart(canvas);
    if (existing) existing.destroy();
    
    var labels = v.sparkline_labels;
    var data = v.sparkline;
    
    // Only show last 12 labels
    if (labels.length > 12) { labels = labels.slice(-12); data = data.slice(-12); }
    
    new Chart(canvas, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          borderColor: v.status === 'reorder' ? '#ff453a' : v.status === 'markdown' ? '#ff9f0a' : '#0a84ff',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.4,
          fill: false
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: false },
          y: { display: false, min: 0 }
        },
        animation: false
      }
    });
  }
}

function openModal(idx){
  var v = D.variants[idx];
  var m = document.getElementById('modal');
  var sc = v.stocksense_score >= 60 ? 'hi' : v.stocksense_score >= 40 ? 'md' : 'lo';
  
  var html = '<button class="close-btn" onclick="closeModal()">×</button>';
  html += '<div class="mtype">' + esc(v.product_type) + ' · ' + esc(v.gender_segment) + '</div>';
  html += '<div class="mname">' + esc(v.product_name) + '</div>';
  html += '<div style="font-size:11px;color:var(--t3)">' + esc(v.sku) + ' · ' + esc(v.variant_id) + '</div>';
  html += '<div class="mscore" style="color:var(--' + (v.stocksense_score >= 60 ? 'rd' : v.stocksense_score >= 40 ? 'am' : 'gr') + ')">' + v.stocksense_score + '</div>';
  html += '<div style="font-size:11px;color:var(--t3);margin-top:-8px">StockSense Score</div>';
  
  html += '<div class="mstats">';
  html += '<div class="mst">Inventory<span>' + v.inventory + ' units</span></div>';
  html += '<div class="mst">Price<span>£' + v.price.toFixed(0) + '</span></div>';
  html += '<div class="mst">Landed Cost<span>£' + v.landed_cost.toFixed(0) + '</span></div>';
  html += '<div class="mst">Margin<span>' + v.margin_pct.toFixed(0) + '%</span></div>';
  html += '<div class="mst">Velocity<span>' + v.velocity_weekly.toFixed(1) + '/wk</span></div>';
  html += '<div class="mst">Cover<span>' + (v.months_cover >= 999 ? '∞' : v.months_cover.toFixed(0) + 'mo') + '</span></div>';
  html += '<div class="mst">3mo Units<span>' + v.units_3mo + '</span></div>';
  html += '<div class="mst">12mo Units<span>' + v.units_12mo + '</span></div>';
  if (v.trend !== 0) html += '<div class="mst">Trend<span style="color:' + (v.trend > 0 ? 'var(--gr)' : 'var(--rd)') + '">' + (v.trend > 0 ? '+' : '') + (v.trend * 100).toFixed(0) + '%</span></div>';
  html += '</div>';
  
  // Demand history chart
  html += '<div class="chart-box"><div class="clabel">Monthly Demand (12 months)</div><canvas id="modal-spark"></canvas></div>';
  
  // Seasonality chart
  if (v.season_curve.length > 0) {
    html += '<div class="chart-box"><div class="clabel">Seasonality Curve — ' + esc(v.product_type) + '</div><canvas id="modal-season"></canvas></div>';
  }
  
  html += '<div class="mrec ' + v.status + '-rec"><strong>' + esc(v.recommendation) + '</strong><br>' + esc(v.recommendation_detail) + '</div>';
  
  m.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  
  // Render detail charts
  setTimeout(function(){
    // Demand history
    var sparkCtx = document.getElementById('modal-spark');
    if (sparkCtx && v.sparkline.length > 1) {
      var labels = v.sparkline_labels;
      var data = v.sparkline;
      if (labels.length > 12) { labels = labels.slice(-12); data = data.slice(-12); }
      new Chart(sparkCtx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{ data: data, backgroundColor: '#0a84ff88', borderColor: '#0a84ff', borderWidth: 1, borderRadius: 4 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#6e6e73', font: { size: 9 }, maxRotation: 45 } },
            y: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#6e6e73', font: { size: 9 } }, title: { display: true, text: 'Units', color: '#6e6e73' } }
          }
        }
      });
    }
    
    // Seasonality
    var seasonCtx = document.getElementById('modal-season');
    if (seasonCtx && v.season_curve.length > 0) {
      var seasonLabels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      new Chart(seasonCtx, {
        type: 'line',
        data: {
          labels: seasonLabels,
          datasets: [{ data: v.season_curve, borderColor: '#bf5af2', backgroundColor: '#bf5af220', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#bf5af2', tension: 0.4, fill: true }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#6e6e73', font: { size: 9 } } },
            y: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#6e6e73', font: { size: 9 } }, title: { display: true, text: 'Units', color: '#6e6e73' } }
          }
        }
      });
    }
  }, 100);
}

function closeModal(e){
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
